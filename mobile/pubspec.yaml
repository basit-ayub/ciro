name: ciro_mobile
description: "CIRO Mobile Interface - Crisis Intelligence & Response Orchestrator"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.13.6
  
  # Maps
  google_maps_flutter: ^2.5.3
  
  # UI & Animations
  lottie: ^3.0.0
  google_fonts: any
  
  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  dio: ^5.4.0 # For API calls to the FastAPI backend (e.g., streaming)
  flutter_dotenv: ^5.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
    - .env
